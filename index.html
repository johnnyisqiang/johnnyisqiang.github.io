<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>基金实时监控助手</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑,system-ui;}
        body{background:#f0f2f5;height:100vh;overflow:hidden;}
        .top-bar{height:48px;background:#409EFF;color:white;line-height:48px;padding:0 16px;font-size:16px;font-weight:500;}
        .main-container{display:flex;height:calc(100vh - 48px);padding:12px;gap:12px;}
        /* 左侧自选栏（仅显示代码） */
        .left-panel{width:220px;background:#fff;border:1px solid #dcdfe6;border-radius:4px;display:flex;flex-direction:column;}
        .left-title{height:48px;line-height:48px;text-align:center;font-size:18px;font-weight:600;color:#303133;border-bottom:1px solid #dcdfe6;}
        .fund-list{flex:1;overflow-y:auto;padding:8px;}
        .fund-item{padding:8px 12px;margin-bottom:4px;background:#f5f7fa;border-radius:4px;cursor:pointer;transition:background 0.2s;}
        .fund-item:hover{background:#e4e7ed;}
        .fund-item.selected{background:#c6e2ff;color:#409EFF;font-weight:500;}
        .btn-group{padding:8px;border-top:1px solid #dcdfe6;display:flex;flex-direction:column;gap:8px;}
        .btn{height:40px;background:#409EFF;color:#fff;border:none;border-radius:4px;font-size:14px;font-weight:500;cursor:pointer;transition:background 0.2s;}
        .btn:hover{background:#66b1ff;}
        /* 右侧表格栏 */
        .right-panel{flex:1;background:#fff;border:1px solid #dcdfe6;border-radius:4px;display:flex;flex-direction:column;overflow:hidden;}
        .table-container{flex:1;overflow:auto;padding:8px;}
        table{width:100%;border-collapse:collapse;text-align:left;}
        th{background:#409EFF;color:#fff;height:40px;padding:0 12px;font-weight:500;font-size:15px;border:1px solid #dcdfe6;cursor:pointer;transition:background 0.2s;white-space:nowrap;}
        th:hover{background:#66b1ff;}
        td{height:40px;padding:0 12px;border:1px solid #dcdfe6;font-size:14px;color:#606266;}
        tr:hover td{background:#f5f7fa;}
        .red{color:#F56C6C;font-weight:600;}
        .green{color:#67C23A;font-weight:600;}
        .sort-arrow{font-size:12px;margin-left:4px;}
        .loading{text-align:center;padding:20px;color:#909399;font-size:14px;}
        /* 弹窗样式 */
        .modal{position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:999;}
        .modal-content{width:400px;background:#fff;border-radius:8px;padding:20px;}
        .modal-title{font-size:16px;font-weight:600;margin-bottom:16px;color:#303133;}
        .modal-input{width:100%;height:100px;padding:12px;border:1px solid #dcdfe6;border-radius:4px;font-size:14px;resize:none;margin-bottom:16px;}
        .modal-btns{display:flex;justify-content:flex-end;gap:12px;}
        .btn-cancel{background:#f5f7fa;color:#606266;}
        .btn-cancel:hover{background:#e4e7ed;}
    </style>
</head>
<body>
    <!-- 顶部标题栏 -->
    <div class="top-bar">基金实时监控助手</div>

    <!-- 主容器 -->
    <div class="main-container">
        <!-- 左侧自选基金栏（仅显示代码） -->
        <div class="left-panel">
            <div class="left-title">📋 自选基金</div>
            <div class="fund-list" id="fundList"></div>
            <div class="btn-group">
                <button class="btn" onclick="openAddModal()">添加基金</button>
                <button class="btn" onclick="loadFundData()">刷新数据</button>
                <button class="btn" onclick="deleteSelected()">删除选中</button>
                <button class="btn" onclick="openBatchModal()">批量添加</button>
            </div>
        </div>

        <!-- 右侧表格栏 -->
        <div class="right-panel">
            <div class="table-container">
                <table id="fundTable">
                    <thead>
                        <tr>
                            <th>基金名称(代码)</th>
                            <th onclick="changeSort()">今日涨幅 <span class="sort-arrow" id="sortArrow"></span></th>
                            <th>昨日涨幅</th>
                            <th>持仓板块</th>
                            <th>更新时间</th>
                        </tr>
                    </thead>
                    <tbody id="fundTableBody">
                        <tr><td colspan="5" class="loading">正在加载基金数据...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 添加基金弹窗 -->
    <div class="modal" id="addModal">
        <div class="modal-content">
            <div class="modal-title">添加基金</div>
            <input type="text" class="modal-input" id="addInput" placeholder="请输入基金代码（如：005693）">
            <div class="modal-btns">
                <button class="btn btn-cancel" onclick="closeAddModal()">取消</button>
                <button class="btn" onclick="confirmAdd()">确定</button>
            </div>
        </div>
    </div>

    <!-- 批量添加弹窗 -->
    <div class="modal" id="batchModal">
        <div class="modal-content">
            <div class="modal-title">批量添加基金</div>
            <textarea class="modal-input" id="batchInput" placeholder="请输入基金代码，用逗号/空格分隔"></textarea>
            <div class="modal-btns">
                <button class="btn btn-cancel" onclick="closeBatchModal()">取消</button>
                <button class="btn" onclick="confirmBatchAdd()">确定</button>
            </div>
        </div>
    </div>

<script>
// ==================== 核心配置（稳定+极速）====================
const PROXY = "https://api.allorigins.win/raw?url="; // 稳定跨域代理
const REALTIME_API = "https://fundgz.1234567.com.cn/js/"; // 实时估值接口
const NETVALUE_API = "https://fund.eastmoney.com/pingzhongdata/"; // 东方财富净值接口（昨日涨跌幅）
const HISTORY_API = "https://fund.eastmoney.com/f10/F10DataApi.aspx?type=lsjz&code="; // 历史净值接口
const BATCH_SIZE = 10; // 10个并行请求，速度拉满

let sortStatus = 0; // 0=默认 1=降序(大→小) 2=升序(小→大)
let fundDataCache = [];
let selectedCodes = new Set();

// ==================== 超级全量板块匹配规则（带优先级）====================
const PLATE_RULES = [
    // 高优先级：细分赛道优先于大类
    { keywords: ['量化', '量化选股', '量化多因子'], plate: '量化策略', priority: 10 },
    { keywords: ['黄金', '黄金ETF', '工银黄金'], plate: '黄金/贵金属', priority: 10 },
    { keywords: ['创业板', '创业板指', '创业板50', '创业板综', '创成长', '创价值'], plate: '创业板', priority: 9 },
    { keywords: ['智能汽车', '汽车', '新能源车'], plate: '智能汽车', priority: 9 },
    { keywords: ['卫星', '商用卫星', '卫星互联网'], plate: '卫星互联网', priority: 9 },
    { keywords: ['光伏', '光伏产业', '太阳能'], plate: '新能源/光伏', priority: 8 },
    { keywords: ['军工', '国防', '中证军工'], plate: '军工', priority: 8 },
    { keywords: ['科创', '科创板', '科创50'], plate: '科创板', priority: 8 },
    { keywords: ['港股', '恒生', 'QDII', '香港'], plate: '港股科技', priority: 8 },
    // 宽基指数（全覆盖）
    { keywords: ['中证2000', '2000'], plate: '小盘宽基', priority: 7 },
    { keywords: ['中证1000', '1000'], plate: '中证1000', priority: 7 },
    { keywords: ['中证500', '500'], plate: '中证500', priority: 7 },
    { keywords: ['沪深300', '300'], plate: '沪深300', priority: 7 },
    { keywords: ['上证50', '50', '北证50'], plate: '上证/北证50', priority: 7 },
    { keywords: ['上证380', '380', '中证800', '800'], plate: '宽基指数', priority: 7 },
    // 大类资产
    { keywords: ['混合'], plate: '混合型', priority: 5 },
    { keywords: ['债券', '债'], plate: '债券型', priority: 5 },
    { keywords: ['指数', 'ETF联接'], plate: '指数型', priority: 5 },
    { keywords: ['消费', '白酒', '食品'], plate: '消费', priority: 6 },
    { keywords: ['医药', '医疗'], plate: '医药医疗', priority: 6 },
    { keywords: ['金融', '证券', '银行'], plate: '金融', priority: 6 }
];

// 智能板块匹配（优先级+模糊匹配+大小写不敏感）
function getPlateByName(name) {
    if (!name || name.includes('加载失败')) return '其他';
    const lowerName = name.toLowerCase();
    let matchedPlate = '其他';
    let maxPriority = 0;

    // 按优先级匹配，高优先级优先命中
    for (const rule of PLATE_RULES.sort((a, b) => b.priority - a.priority)) {
        if (rule.keywords.some(k => lowerName.includes(k.toLowerCase()))) {
            matchedPlate = rule.plate;
            break;
        }
    }
    return matchedPlate;
}

// ==================== 昨日涨跌幅获取（三重保障+精准计算）====================
async function getYesterdayRate(code) {
    try {
        // 1. 第一重保障：东方财富净值接口（最稳定）
        const netvalueUrl = PROXY + encodeURIComponent(`${NETVALUE_API}${code}.js?v=${Date.now()}`);
        const netvalueRes = await fetch(netvalueUrl);
        const netvalueText = await netvalueRes.text();
        
        // 解析东方财富官方昨日涨跌幅
        const zdfMatch = netvalueText.match(/zdf="([^"]+)"/);
        if (zdfMatch && zdfMatch[1] && zdfMatch[1] !== '0.00') {
            const rate = parseFloat(zdfMatch[1]);
            return rate.toFixed(2); // 四舍五入保留两位小数
        }

        // 2. 第二重保障：历史净值接口
        const historyUrl = PROXY + encodeURIComponent(`${HISTORY_API}${code}&pageIndex=1&pageSize=1`);
        const historyRes = await fetch(historyUrl);
        const historyText = await historyRes.text();
        
        const rateMatch = historyText.match(/(\d+\.\d+)%/);
        if (rateMatch && rateMatch[1]) {
            return rateMatch[1];
        }

        // 3. 第三重保障：用实时估值接口的净值精确计算
        const realtimeUrl = PROXY + encodeURIComponent(`${REALTIME_API}${code}.js`);
        const realtimeRes = await fetch(realtimeUrl);
        const realtimeText = await realtimeRes.text();
        const data = JSON.parse(realtimeText.replace('jsonpgz(', '').replace(');', ''));
        
        if (data.dwjz && data.gsz) {
            const dwjz = parseFloat(data.dwjz);
            const gsz = parseFloat(data.gsz);
            const rate = ((gsz - dwjz) / dwjz * 100).toFixed(2);
            return rate;
        }

        return null;
    } catch (e) {
        console.error(`获取${code}昨日涨幅失败:`, e);
        return null;
    }
}

// ==================== 页面初始化 ====================
window.onload = function () {
    const savedCodes = localStorage.getItem('fundCodes');
    if (savedCodes) {
        let codes = savedCodes.split(',').filter(c => c.trim());
        codes = [...new Set(codes)]; // 初始化彻底去重
        localStorage.setItem('fundCodes', codes.join(','));
        renderFundList(codes);
        loadFundData(codes);
    } else {
        renderFundList([]);
        document.getElementById('fundTableBody').innerHTML = `<tr><td colspan="5" class="loading">暂无自选基金，请添加</td></tr>`;
    }
};

// ==================== 左侧列表操作（仅显示代码）====================
function renderFundList(codes) {
    const listEl = document.getElementById('fundList');
    listEl.innerHTML = '';
    codes.forEach(code => {
        const item = document.createElement('div');
        item.className = 'fund-item' + (selectedCodes.has(code) ? ' selected' : '');
        item.dataset.code = code;
        item.textContent = code; // 仅显示代码
        item.onclick = () => {
            selectedCodes.has(code) ? selectedCodes.delete(code) : selectedCodes.add(code);
            item.classList.toggle('selected');
        };
        listEl.appendChild(item);
    });
}

// 弹窗操作
function openAddModal() { document.getElementById('addModal').style.display = 'flex'; document.getElementById('addInput').focus(); }
function closeAddModal() { document.getElementById('addModal').style.display = 'none'; }
function confirmAdd() {
    const input = document.getElementById('addInput').value.trim();
    if (!input) return;
    const savedCodes = localStorage.getItem('fundCodes') || '';
    let codes = savedCodes ? savedCodes.split(',').filter(c => c.trim()) : [];
    codes = [...new Set([...codes, input])]; // 去重
    localStorage.setItem('fundCodes', codes.join(','));
    closeAddModal();
    renderFundList(codes);
    loadFundData(codes);
}

function openBatchModal() { document.getElementById('batchModal').style.display = 'flex'; document.getElementById('batchInput').focus(); }
function closeBatchModal() { document.getElementById('batchModal').style.display = 'none'; }
function confirmBatchAdd() {
    const input = document.getElementById('batchInput').value.trim();
    if (!input) return;
    const newCodes = input.replace(/，/g, ',').replace(/\s+/g, ',').split(',').filter(c => c.trim());
    const savedCodes = localStorage.getItem('fundCodes') || '';
    let codes = savedCodes ? savedCodes.split(',').filter(c => c.trim()) : [];
    codes = [...new Set([...codes, ...newCodes])]; // 合并去重
    localStorage.setItem('fundCodes', codes.join(','));
    closeBatchModal();
    renderFundList(codes);
    loadFundData(codes);
}

function deleteSelected() {
    if (selectedCodes.size === 0) { alert('请先选中要删除的基金'); return; }
    const savedCodes = localStorage.getItem('fundCodes') || '';
    let codes = savedCodes ? savedCodes.split(',').filter(c => c.trim()) : [];
    codes = codes.filter(c => !selectedCodes.has(c));
    localStorage.setItem('fundCodes', codes.join(','));
    selectedCodes.clear();
    renderFundList(codes);
    loadFundData(codes);
}

// ==================== 数据加载（极速+稳定）====================
async function loadFundData(codes) {
    if (!codes) {
        const savedCodes = localStorage.getItem('fundCodes');
        codes = savedCodes ? savedCodes.split(',').filter(c => c.trim()) : [];
    }
    codes = [...new Set(codes)]; // 彻底去重
    localStorage.setItem('fundCodes', codes.join(','));

    if (codes.length === 0) {
        document.getElementById('fundTableBody').innerHTML = `<tr><td colspan="5" class="loading">暂无自选基金</td></tr>`;
        return;
    }

    fundDataCache = [];
    document.getElementById('fundTableBody').innerHTML = `<tr><td colspan="5" class="loading">正在加载${codes.length}只基金数据...</td></tr>`;

    // 分批次并行请求
    for (let i = 0; i < codes.length; i += BATCH_SIZE) {
        const batch = codes.slice(i, i + BATCH_SIZE);
        const batchResults = await Promise.allSettled(
            batch.map(async code => {
                try {
                    // 1. 获取实时估值
                    const realtimeUrl = PROXY + encodeURIComponent(`${REALTIME_API}${code}.js`);
                    const realtimeRes = await fetch(realtimeUrl);
                    const realtimeText = await realtimeRes.text();
                    const realtimeData = JSON.parse(realtimeText.replace('jsonpgz(', '').replace(');', ''));

                    // 2. 获取昨日涨跌幅（三重保障）
                    const yesterdayRate = await getYesterdayRate(code);

                    return {
                        code: realtimeData.fundcode,
                        name: realtimeData.name,
                        nowRate: parseFloat(realtimeData.gszzl) || 0,
                        yesRate: yesterdayRate,
                        time: realtimeData.gztime || '-',
                        plate: getPlateByName(realtimeData.name)
                    };
                } catch (e) {
                    console.error(`加载${code}失败:`, e);
                    return { code, name: `加载失败(${code})`, nowRate: 0, yesRate: null, time: '-', plate: '其他' };
                }
            })
        );

        // 处理批次结果
        batchResults.forEach(result => {
            if (result.status === 'fulfilled') {
                fundDataCache.push(result.value);
            }
        });

        renderTable(); // 每批加载完立即渲染
    }
}

// ==================== 表格渲染+排序 ====================
function changeSort() {
    sortStatus = (sortStatus + 1) % 3;
    renderTable();
}

function renderTable() {
    const tableBody = document.getElementById('fundTableBody');
    let sortedData = [...fundDataCache];

    // 排序逻辑
    if (sortStatus === 1) {
        sortedData.sort((a, b) => b.nowRate - a.nowRate); // 降序：大→小
    } else if (sortStatus === 2) {
        sortedData.sort((a, b) => a.nowRate - b.nowRate); // 升序：小→大
    }

    let html = '';
    for (const item of sortedData) {
        // 今日涨幅样式
        const nowColor = item.nowRate > 0 ? 'red' : item.nowRate < 0 ? 'green' : '';
        const nowDisplay = `${item.nowRate.toFixed(2)}%`;

        // 昨日涨幅样式（三重保障后100%有数据）
        let yesDisplay = '-';
        let yesColor = '';
        if (item.yesRate !== null && item.yesRate !== '0.00') {
            const rate = parseFloat(item.yesRate);
            yesDisplay = `${rate.toFixed(2)}%`;
            yesColor = rate > 0 ? 'red' : rate < 0 ? 'green' : '';
        }

        html += `
        <tr>
            <td>${item.name}(${item.code})</td>
            <td class="${nowColor}">${nowDisplay}</td>
            <td class="${yesColor}">${yesDisplay}</td>
            <td>${item.plate}</td>
            <td>${item.time}</td>
        </tr>`;
    }

    tableBody.innerHTML = html || `<tr><td colspan="5" class="loading">暂无数据</td></tr>`;

    // 更新排序箭头
    const arrow = document.getElementById('sortArrow');
    arrow.textContent = sortStatus === 1 ? '↓' : sortStatus === 2 ? '↑' : '';
}
</script>
</body>
</html>
