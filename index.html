<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>基金实时监控</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑,system-ui;}
        body{padding:15px;background:#f6f7f9;}
        .container{max-width:900px;margin:0 auto;}
        h1{text-align:center;margin:20px 0;color:#333;}
        .input-box{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:16px;margin-bottom:10px;}
        .btn{width:100%;padding:12px;background:#2ecc71;color:white;border:none;border-radius:8px;font-size:16px;margin-bottom:15px;cursor:pointer;}
        .btn-refresh{background:#3498db;}
        .tips{text-align:center;color:#666;font-size:14px;margin-bottom:10px;line-height:1.5;}
        table{width:100%;border-collapse:collapse;background:white;border-radius:8px;overflow:hidden;box-shadow:0 1px 3px #00000010;}
        th{background:#2ecc71;color:white;padding:12px;text-align:left;}
        td{padding:12px;border-bottom:1px solid #eee;}
        .red{color:#e74c3c;font-weight:bold;}
        .green{color:#2ecc71;font-weight:bold;}
    </style>
</head>
<body>
    <div class="container">
        <h1>💰 基金实时监控</h1>
        <p class="tips">批量输入基金代码，自动保存/去重/按涨幅排序<br>例：005693,161725,003096</p>

        <textarea class="input-box" id="fundInput" rows="4" placeholder="请输入基金代码" oninput="localStorage.setItem('fundCodes', this.value)"></textarea>
        <button class="btn btn-refresh" onclick="loadFundData()">🔄 手动刷新数据</button>

        <table id="fundTable">
            <tr>
                <th>基金名称</th>
                <th>实时涨幅</th>
                <th>昨日涨跌幅</th>
                <th>更新时间</th>
            </tr>
        </table>
    </div>

<script>
// 稳定跨域代理 + 东方财富正规基金接口（自带昨日涨跌幅）
const proxy = "https://api.codetabs.com/v1/proxy?quest=";
const fundApi = "https://fundapi.eastmoney.com/fundtradenew.aspx?ft=1&sc=hb&st=desc&pi=1&pn=50&cp=&ct=&cd=&ms=&fr=&plevel=&fst=&ftype=&fr1=&qdii=&tabSubtype=&pi=1&sf=&gs=&hybz=&ndbb=&appTy=0&cb=jQuery";

// 页面加载：自动读取保存代码 + 自动加载数据
window.onload = function () {
    let saved = localStorage.getItem("fundCodes");
    if (saved) {
        document.getElementById("fundInput").value = saved;
        loadFundData();
    }
};

// 核心：加载数据 + 去重 + 排序 + 昨日涨跌幅
async function loadFundData() {
    let input = document.getElementById("fundInput").value.trim();
    if (!input) return;

    // 格式化+去重
    let codes = input.replace(/，/g, ",").replace(/\s+/g, ",").split(",").filter(c => c);
    let uniqueCodes = [...new Set(codes)];
    let fundList = [];

    for (let code of uniqueCodes) {
        try {
            let url = proxy + encodeURIComponent(`https://fund.eastmoney.com/pcweb/funddetail/${code}.html`);
            let res = await fetch(url);
            let text = await res.text();
            
            // 正则提取核心数据（名称/实时涨幅/昨日涨跌幅/时间）
            let name = text.match(/fundName:\s*"([^"]+)"/)?.[1] || "未知基金";
            let now = text.match(/gsz:\s*"([^"]+)"/)?.[1] || "0";
            let nowRate = text.match(/gszzl:\s*"([^"]+)"/)?.[1] || "0";
            let yesRate = text.match(/dwjzze:\s*"([^"]+)"/)?.[1] || "0";
            let time = text.match(/gztime:\s*"([^"]+)"/)?.[1] || "无时间";

            fundList.push({
                name, nowRate: parseFloat(nowRate), yesRate: parseFloat(yesRate), time
            });
        } catch (e) {
            fundList.push({ name: `加载失败(${code})`, nowRate: 0, yesRate: 0, time: "-" });
        }
    }

    // ✅ 排序：按实时涨幅 从高到低 排序
    fundList.sort((a, b) => b.nowRate - a.nowRate);

    // 渲染表格
    let table = document.getElementById("fundTable");
    table.innerHTML = `<tr><th>基金名称</th><th>实时涨幅</th><th>昨日涨跌幅</th><th>更新时间</th></tr>`;
    fundList.forEach(item => {
        let nowColor = item.nowRate > 0 ? "red" : "green";
        let yesColor = item.yesRate > 0 ? "red" : item.yesRate < 0 ? "green" : "";
        
        table.innerHTML += `
        <tr>
            <td>${item.name}</td>
            <td class="${nowColor}">${item.nowRate.toFixed(2)}%</td>
            <td class="${yesColor}">${item.yesRate.toFixed(2)}%</td>
            <td>${item.time}</td>
        </tr>`;
    });
}
</script>
</body>
</html>
