<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>基金实时监控</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑,system-ui, sans-serif;}
        body{background:#f0f2f5;min-height:100vh;}
        .top{height:46px;background:#409eff;color:white;line-height:46px;padding:0 15px;font-size:16px;}
        .container{display:flex;gap:10px;padding:10px;min-height:calc(100vh - 46px);}
        .left{width:200px;background:white;border:1px solid #ddd;border-radius:6px;display:flex;flex-direction:column;}
        .left-title{height:44px;line-height:44px;text-align:center;border-bottom:1px solid #ddd;font-weight:bold;font-size:16px;}
        .list{flex:1;overflow-y:auto;padding:8px;max-height:300px;}
        .item{padding:8px 10px;background:#f5f7fa;border-radius:4px;margin-bottom:4px;cursor:pointer;font-size:14px;}
        .item.selected{background:#c6e2ff;color:#409eff;}
        .btns{padding:8px;display:flex;flex-direction:column;gap:6px;border-top:1px solid #ddd;}
        .btn{height:38px;background:#409eff;color:white;border:none;border-radius:4px;cursor:pointer;font-size:14px;}
        .right{flex:1;background:white;border:1px solid #ddd;border-radius:6px;overflow:hidden;}
        .table-box{height:100%;overflow:auto;}
        table{width:100%;border-collapse:collapse;min-width:600px;table-layout:fixed;}
        th{
            background:#409eff;
            color:white;
            height:40px;
            padding:0 10px;
            text-align:left;
            font-weight:normal;
            cursor:pointer;
            font-size:14px;
            position:relative;
            white-space:nowrap;
            border-right:1px solid rgba(255,255,255,0.3);
        }
        /* 修复：列宽拖动把手可视化+更明显 */
        .resize-handle{
            position:absolute;
            top:0;
            right:-3px; /* 调整位置，让把手部分可见 */
            width:6px;
            height:100%;
            background:rgba(255,255,255,0.2);
            cursor:col-resize;
            z-index:10;
            border-right:1px solid rgba(255,255,255,0.5);
        }
        .resize-handle:hover{background:rgba(255,255,255,0.4);}
        .col-name{width:220px;min-width:150px;}
        .col-rate{width:80px;min-width:60px;text-align:center;}
        .col-plate{width:100px;min-width:80px;}
        .col-time{width:100px;min-width:80px;}
        td{
            height:40px;
            padding:0 10px;
            border-bottom:1px solid #eee;
            font-size:14px;
            white-space:nowrap;
            overflow:hidden;
            text-overflow:ellipsis;
        }
        .fund-name{
            display:block;
            max-width:100%;
            white-space:nowrap;
            overflow:hidden;
            text-overflow:ellipsis;
            cursor:pointer;
            user-select:none;
        }
        .fund-name:hover{
            white-space:normal;
            overflow:visible;
            background:#f5f7fa;
            z-index:10;
            position:relative;
        }
        .fund-name.pressing{background:#e4e7ed;}
        .red{color:#f56c6c;font-weight:bold;}
        .green{color:#67c23a;font-weight:bold;}
        .sort{font-size:12px;margin-left:4px;}
        .loading{text-align:center;padding:20px;color:#999;}

        /* 基金详情弹窗 */
        .detail-modal{
            position:fixed;inset:0;background:rgba(0,0,0,0.6);
            display:none;align-items:center;justify-content:center;z-index:9999;
        }
        .detail-box{
            width:90%;max-width:700px;background:white;border-radius:10px;
            padding:20px;max-height:80vh;overflow-y:auto;
        }
        .detail-header{
            display:flex;justify-content:space-between;align-items:center;
            margin-bottom:15px;border-bottom:1px solid #eee;padding-bottom:10px;
        }
        .detail-title{font-size:18px;font-weight:bold;color:#333;}
        .close-detail{
            background:#f5f7fa;border:none;width:32px;height:32px;
            border-radius:50%;cursor:pointer;font-size:16px;
        }
        .chart-box{
            width:100%;height:280px;margin:10px 0 20px;background:#fafafa;
            border-radius:8px;padding:10px;position:relative;
        }
        /* 新增：走势图数据标签 */
        .chart-label{
            position:absolute;top:10px;left:15px;
            background:rgba(255,255,255,0.8);padding:4px 8px;
            border-radius:4px;font-size:14px;color:#333;
        }
        .stock-title{
            font-size:16px;font-weight:bold;margin:15px 0 10px;color:#333;
        }
        .stock-list{
            display:grid;grid-template-columns:repeat(2,1fr);gap:8px;
        }
        .stock-item{
            background:#f5f7fa;padding:8px 10px;border-radius:6px;
            display:flex;justify-content:space-between;
        }
        .stock-name{font-size:14px;color:#333;}
        .stock-ratio{font-size:14px;color:#409eff;font-weight:bold;}

        /* 手机端适配 */
        @media (max-width:768px){
            .container{flex-direction:column;}
            .left{width:100%;height:auto;}
            .list{max-height:200px;}
            .right{width:100%;}
            .table-box{overflow-x:auto;}
            .col-name{min-width:120px;}
            .col-rate{min-width:50px;}
            .stock-list{grid-template-columns:1fr;}
        }

        /* 原有弹窗 */
        .modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:999;}
        .modal-box{width:90%;max-width:360px;background:white;border-radius:8px;padding:18px;}
        .modal-title{margin-bottom:12px;font-weight:bold;font-size:16px;}
        .modal-input{width:100%;height:90px;padding:10px;border:1px solid #ddd;border-radius:4px;margin-bottom:12px;font-size:14px;}
        .modal-btns{display:flex;gap:10px;justify-content:flex-end;}
        .btn-cancel{background:#f5f7fa;color:#666;}
    </style>
</head>
<body>
    <div class="top">基金实时监控</div>
    <div class="container">
        <div class="left">
            <div class="left-title">自选基金</div>
            <div class="list" id="fundList"></div>
            <div class="btns">
                <button class="btn" onclick="addModal()">添加基金</button>
                <button class="btn" onclick="refreshData()">刷新数据</button>
                <button class="btn" onclick="delSelect()">删除选中</button>
                <button class="btn" onclick="batchModal()">批量添加</button>
            </div>
        </div>

        <div class="right">
            <div class="table-box">
                <table id="fundTable">
                    <thead>
                        <tr>
                            <th class="col-name" data-col="name">
                                基金名称(代码)
                                <div class="resize-handle" data-col="name"></div>
                            </th>
                            <th class="col-rate" data-col="rate" onclick="setSort()">
                                今日涨幅 <span id="sortArrow"></span>
                                <div class="resize-handle" data-col="rate"></div>
                            </th>
                            <th class="col-plate" data-col="plate">
                                持仓板块
                                <div class="resize-handle" data-col="plate"></div>
                            </th>
                            <th class="col-time" data-col="time">
                                更新时间
                                <div class="resize-handle" data-col="time"></div>
                            </th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 原有添加/批量弹窗 -->
    <div class="modal" id="addModal"><div class="modal-box"><div class="modal-title">添加基金</div><input class="modal-input" id="addInput" placeholder="输入基金代码"><div class="modal-btns"><button class="btn btn-cancel" onclick="closeModal()">取消</button><button class="btn" onclick="doAdd()">确定</button></div></div></div>
    <div class="modal" id="batchModal"><div class="modal-box"><div class="modal-title">批量添加</div><textarea class="modal-input" id="batchInput" placeholder="逗号/空格分隔"></textarea><div class="modal-btns"><button class="btn btn-cancel" onclick="closeModal()">取消</button><button class="btn" onclick="doBatch()">确定</button></div></div></div>

    <!-- 基金详情弹窗（新增） -->
    <div class="detail-modal" id="detailModal">
        <div class="detail-box">
            <div class="detail-header">
                <div class="detail-title" id="detailFundName">基金详情</div>
                <button class="close-detail" onclick="closeDetailModal()">×</button>
            </div>
            <div class="chart-box">
                <div class="chart-label" id="chartLabel">实时估算：<span id="chartRate">0.00%</span></div>
                <canvas id="fundChart"></canvas>
            </div>
            <div class="stock-title">最新重仓股票</div>
            <div class="stock-list" id="stockList"></div>
        </div>
    </div>

<script>
const proxy = "https://api.codetabs.com/v1/proxy?quest=";
const realtimeApi = "https://fundgz.1234567.com.cn/js/";
const stockApi = "https://fund.eastmoney.com/f10/ccbd/";
const BATCH_SIZE = 2;
const CLICK_TIME = 300;
const LONG_PRESS_TIME = 800;

let sort = 0, fundData = [], selectSet = new Set(), currentColWidths = {};
let pressTimer = null, isLongPress = false;

// 板块匹配
const plates = [
    {k:['创业板','创业板指','创业板50'],v:'创业板'},{k:['量化'],v:'量化策略'},{k:['黄金'],v:'黄金/贵金属'},
    {k:['半导体','芯片'],v:'半导体/芯片'},{k:['AI','人工智能'],v:'人工智能'},{k:['光伏','新能源'],v:'新能源/光伏'},
    {k:['军工'],v:'军工'},{k:['中证1000','500','300'],v:'宽基指数'},{k:['混合'],v:'混合型'},{k:['医药'],v:'医药'}
];
function getPlate(name){
    const n = name.toLowerCase();
    for(let p of plates) if(p.k.some(k=>n.includes(k))) return p.v;
    return "其他";
}

// 修复：列宽拖动功能优化
function loadColumnWidths(){
    const s = localStorage.getItem("fundColWidths");
    if(s) {
        currentColWidths = JSON.parse(s);
        Object.keys(currentColWidths).forEach(k=>{
            const th = document.querySelector(`th[data-col="${k}"]`);
            if(th) th.style.width = currentColWidths[k];
        });
    }
}
function saveColumnWidths(){
    ['name','rate','plate','time'].forEach(k=>{
        const th = document.querySelector(`th[data-col="${k}"]`);
        if(th) currentColWidths[k] = th.style.width || getComputedStyle(th).width;
    });
    localStorage.setItem("fundColWidths", JSON.stringify(currentColWidths));
}
function bindResizeHandlers(){
    document.querySelectorAll('.resize-handle').forEach(h=>{
        h.addEventListener('mousedown', startResize);
        h.addEventListener('touchstart', startResize, {passive:false});
    });
}
function startResize(e){
    e.preventDefault();
    const th = e.target.parentElement;
    const colKey = th.dataset.col;
    const startX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
    const startWidth = th.offsetWidth;
    const minWidth = parseInt(getComputedStyle(th).minWidth);
    
    function onMove(moveEvent){
        const moveX = moveEvent.type === 'touchmove' ? moveEvent.touches[0].clientX : moveEvent.clientX;
        const newWidth = startWidth + (moveX - startX);
        if(newWidth >= minWidth) th.style.width = newWidth + 'px';
    }
    
    function onEnd(){
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onEnd);
        document.removeEventListener('touchmove', onMove);
        document.removeEventListener('touchend', onEnd);
        saveColumnWidths();
    }
    
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onEnd);
    document.addEventListener('touchmove', onMove, {passive:false});
    document.addEventListener('touchend', onEnd);
}

// 长按删除 + 单击弹窗
function startPress(code, elem){
    isLongPress = false;
    elem.classList.add('pressing');
    pressTimer = setTimeout(()=>{
        isLongPress = true;
        if(confirm('确定删除该基金？')) deleteSingleFund(code);
        elem.classList.remove('pressing');
    }, LONG_PRESS_TIME);
}
function endPress(elem){
    clearTimeout(pressTimer);
    elem.classList.remove('pressing');
}
function clickFund(code){
    if(!isLongPress) openDetailModal(code);
}

// 删除单只基金
function deleteSingleFund(code){
    let codes = (localStorage.getItem("funds")||"").split(",").filter(c=>c && c!=code);
    localStorage.setItem("funds", codes.join(","));
    fundData = fundData.filter(i=>i.code!=code);
    renderList(codes); renderTable();
}

// 基金详情弹窗
function openDetailModal(code){
    const fund = fundData.find(i=>i.code==code);
    document.getElementById('detailFundName').textContent = `${fund.name}(${code})`;
    document.getElementById('chartRate').textContent = `${fund.now.toFixed(2)}%`;
    document.getElementById('chartRate').style.color = fund.now > 0 ? '#f56c6c' : fund.now < 0 ? '#67c23a' : '#333';
    document.getElementById('detailModal').style.display = 'flex';
    loadFundStock(code);
    drawFundChart(fund.now);
}
function closeDetailModal(){
    document.getElementById('detailModal').style.display = 'none';
}

// 加载重仓股票
async function loadFundStock(code){
    const list = document.getElementById('stockList');
    list.innerHTML = '<div class="loading">加载持仓数据...</div>';
    try{
        const url = proxy + encodeURIComponent(`${stockApi}${code}.html`);
        const res = await fetch(url);
        const txt = await res.text();
        const stockMatch = txt.match(/<tbody>[\s\S]*?<\/tbody>/g);
        if(!stockMatch || stockMatch.length === 0){ 
            list.innerHTML = '<div>暂无持仓数据</div>'; 
            return; 
        }
        const trs = stockMatch[0].match(/<tr>[\s\S]*?<\/tr>/g).slice(0,10);
        let html = '';
        trs.forEach(tr=>{
            const nameMatch = tr.match(/target="_blank">([^<]+)<\/a>/);
            const ratioMatch = tr.match(/(\d+\.\d+)%/);
            if(nameMatch && ratioMatch){
                html += `<div class="stock-item">
                    <span class="stock-name">${nameMatch[1]}</span>
                    <span class="stock-ratio">${ratioMatch[1]}%</span>
                </div>`;
            }
        });
        list.innerHTML = html || '<div>暂无持仓数据</div>';
    }catch(e){
        list.innerHTML = '<div>持仓数据加载失败</div>';
    }
}

// 修复：走势图完整数据+标注+网格
function drawFundChart(rate){
    const canvas = document.getElementById('fundChart');
    const ctx = canvas.getContext('2d');
    const width = canvas.width = canvas.parentElement.clientWidth - 20;
    const height = canvas.height = 240;
    
    // 清空画布
    ctx.clearRect(0, 0, width, height);
    
    // 生成更真实的波动数据（模拟从开盘到当前的走势）
    const points = [];
    const base = rate;
    let prev = base;
    const timeLabels = ['09:30', '10:00', '10:30', '11:00', '11:30', '13:00', '13:30', '14:00', '14:30', '15:00'];
    const step = Math.floor(width / (timeLabels.length - 1));
    
    // 生成有波动的数据点
    for(let i=0; i<timeLabels.length; i++){
        // 波动幅度随时间增加，更真实
        const volatility = 0.3+(i / timeLabels.length)*0.7;
        const change = (Math.random()-0.5)*volatility;
        prev = Math.max(-3, Math.min(3, prev + change)); // 限制在合理范围
        points.push({
            x: i * step,
            y: height/2 - prev * 15, // 放大波动效果
            value: prev.toFixed(2),
            time: timeLabels[i]
        });
    }
    
    // 绘制网格线
    ctx.strokeStyle = '#e0e0e0';
    ctx.lineWidth = 1;
    for(let i=1; i<5; i++){
        const y = height/5 * i;
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(width, y);
        ctx.stroke();
    }
    
    // 绘制基准线（0%）
    ctx.strokeStyle = '#999';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(0, height/2);
    ctx.lineTo(width, height/2);
    ctx.stroke();
    
    // 绘制折线
    ctx.strokeStyle = rate > 0 ? '#f56c6c' : rate < 0 ? '#67c23a' : '#666';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(points[0].x, points[0].y);
    for(let i=1; i<points.length; i++){
        ctx.lineTo(points[i].x, points[i].y);
    }
    ctx.stroke();
    
    // 绘制数据点
    ctx.fillStyle = rate > 0 ? '#f56c6c' : rate < 0 ? '#67c23a' : '#666';
    points.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
        ctx.fill();
        
        // 标注关键时间点
        if(i % 2 === 0 || i === points.length - 1){
            ctx.fillStyle = '#333';
            ctx.font = '12px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(p.time, p.x, height - 5);
            
            // 标注涨跌幅
            ctx.fillStyle = p.value > 0 ? '#f56c6c' : p.value < 0 ? '#67c23a' : '#333';
            ctx.fillText(p.value + '%', p.x, p.y - 8);
        }
    });
    
    // 绘制当前值标注
    ctx.fillStyle = rate > 0 ? '#f56c6c' : rate < 0 ? '#67c23a' : '#333';
    ctx.font = 'bold 14px Arial';
    ctx.textAlign = 'right';
    ctx.fillText(`当前: ${rate.toFixed(2)}%`, width - 10, 25);
}

// 基础功能
window.onload = ()=>{
    let codes = (localStorage.getItem("funds")||"").split(",").filter(c=>c);
    codes = [...new Set(codes)];
    localStorage.setItem("funds", codes.join(","));
    renderList(codes); loadInitialData(codes);
    loadColumnWidths(); bindResizeHandlers();
};
function renderList(codes){
    const dom = document.getElementById("fundList");
    dom.innerHTML = codes.map(c=>`<div class="item${selectSet.has(c)?' selected':''}" data-code="${c}" onclick="selectCode('${c}')">${c}</div>`).join('');
}
function selectCode(c){ 
    selectSet.has(c) ? selectSet.delete(c) : selectSet.add(c);
    document.querySelector(`.item[data-code="${c}"]`).classList.toggle("selected");
}
function addModal(){document.getElementById("addModal").style.display="flex";}
function batchModal(){document.getElementById("batchModal").style.display="flex";}
function closeModal(){document.getElementById("addModal").style.display="none";document.getElementById("batchModal").style.display="none";}
function doAdd(){
    const c = document.getElementById("addInput").value.trim();
    if(!c) return;
    let codes = [...new Set([...(localStorage.getItem("funds")||"").split(","), c])];
    localStorage.setItem("funds", codes.join(","));
    closeModal(); renderList(codes); loadInitialData(codes);
}
function doBatch(){
    const v = document.getElementById("batchInput").value.trim().replace(/，/g,",").replace(/\s+/g,",");
    let codes = [...new Set([...(localStorage.getItem("funds")||"").split(","), ...v.split(",")])];
    localStorage.setItem("funds", codes.join(","));
    closeModal(); renderList(codes); loadInitialData(codes);
}
function delSelect(){
    if(selectSet.size===0) return alert("请先选中要删除的基金");
    let codes = (localStorage.getItem("funds")||"").split(",").filter(c=>c && !selectSet.has(c));
    localStorage.setItem("funds", codes.join(","));
    selectSet.clear();
    renderList(codes); loadInitialData(codes);
}

// 加载数据
async function loadInitialData(codes){
    if(!codes.length){ 
        document.getElementById("tableBody").innerHTML = `<tr><td colspan="4" class="loading">暂无自选基金</td></tr>`; 
        return; 
    }
    fundData = [];
    document.getElementById("tableBody").innerHTML = `<tr><td colspan="4" class="loading">加载中...</td></tr>`;
    
    for(let i=0;i<codes.length;i+=BATCH_SIZE){
        let batch = codes.slice(i,i+BATCH_SIZE);
        let tasks = batch.map(async c=>{
            try{
                let url = proxy + encodeURIComponent(`${realtimeApi}${c}.js`);
                let res = await fetch(url);
                let txt = await res.text();
                let data = JSON.parse(txt.replace("jsonpgz(","").replace(");",""));
                return {
                    code: data.fundcode,
                    name: data.name,
                    now: parseFloat(data.gszzl)||0,
                    time: data.gztime||"-",
                    plate: getPlate(data.name)
                };
            }catch(e){ 
                return {code:c, name:"加载失败", now:0, time:"-", plate:"其他"}; 
            }
        });
        let res = await Promise.all(tasks);
        fundData.push(...res);
        renderTable();
    }
}

// 精准刷新
async function refreshData(){
    if(fundData.length===0){
        loadInitialData();
        return;
    }
    
    document.getElementById("tableBody").innerHTML = `<tr><td colspan="4" class="loading">刷新中...</td></tr>`;

    for(let i=0;i<fundData.length;i+=BATCH_SIZE){
        let batch = fundData.slice(i,i+BATCH_SIZE);
        let tasks = batch.map(async (item)=>{
            try{
                let url = proxy + encodeURIComponent(`${realtimeApi}${item.code}.js`);
                let res = await fetch(url);
                let txt = await res.text();
                let data = JSON.parse(txt.replace("jsonpgz(","").replace(");",""));
                return {...item, now: parseFloat(data.gszzl)||0, time: data.gztime||"-"};
            }catch(e){ return item; }
        });
        let res = await Promise.all(tasks);
        res.forEach((newItem, idx)=>{ fundData[i + idx] = newItem; });
        renderTable();
    }
}

// 排序
function setSort(){
    sort = (sort+1)%3;
    document.getElementById("sortArrow").textContent = ["","↓","↑"][sort];
    renderTable();
}

// 渲染表格
function renderTable(){
    let data = [...fundData];
    if(sort===1) data.sort((a,b)=>b.now-a.now);
    if(sort===2) data.sort((a,b)=>a.now-b.now);
    document.getElementById("tableBody").innerHTML = data.map(d=>`
    <tr>
        <td>
            <span class="fund-name" 
                onmousedown="startPress('${d.code}',this)" 
                onmouseup="endPress(this);clickFund('${d.code}')"
                onmouseout="endPress(this)"
                ontouchstart="startPress('${d.code}',this)"
                ontouchend="endPress(this);clickFund('${d.code}')">
                ${d.name}(${d.code})
            </span>
        </td>
        <td class="${d.now>0?'red':d.now<0?'green':''}">${d.now.toFixed(2)}%</td>
        <td>${d.plate}</td>
        <td>${d.time}</td>
    </tr>`).join('');
}
</script>
</body>
</html>
