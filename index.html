<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>基金实时监控</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑,system-ui;}
        body{padding:15px;background:#f6f7f9;}
        .container{max-width:900px;margin:0 auto;}
        h1{text-align:center;margin:20px 0;color:#333;}
        .input-box{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:16px;margin-bottom:10px;}
        .btn{width:100%;padding:12px;background:#2ecc71;color:white;border:none;border-radius:8px;font-size:16px;margin-bottom:15px;cursor:pointer;}
        .btn-refresh{background:#3498db;}
        .tips{text-align:center;color:#666;font-size:14px;margin-bottom:10px;line-height:1.5;}
        table{width:100%;border-collapse:collapse;background:white;border-radius:8px;overflow:hidden;box-shadow:0 1px 3px #00000010;}
        th{background:#2ecc71;color:white;padding:12px;text-align:left;cursor:pointer;}
        td{padding:12px;border-bottom:1px solid #eee;}
        .red{color:#e74c3c;font-weight:bold;}
        .green{color:#2ecc71;font-weight:bold;}
        /* 排序箭头样式 */
        .sort-arrow{font-size:12px;margin-left:5px;}
    </style>
</head>
<body>
    <div class="container">
        <h1>💰 基金实时监控</h1>
        <p class="tips">批量输入基金代码，自动保存/去重 | 点击「实时涨幅」排序</p>

        <textarea class="input-box" id="fundInput" rows="4" placeholder="请输入基金代码，用逗号/空格分隔" oninput="localStorage.setItem('fundCodes', this.value)"></textarea>
        <button class="btn btn-refresh" onclick="loadFundData()">🔄 手动刷新数据</button>

        <table id="fundTable">
            <tr>
                <th>基金名称</th>
                <!-- 点击排序的表头 -->
                <th onclick="changeSort()">实时涨幅 <span class="sort-arrow" id="sortArrow"></span></th>
                <th>昨日涨跌幅</th>
                <th>更新时间</th>
            </tr>
        </table>
    </div>

<script>
// 稳定配置
const proxy = "https://api.codetabs.com/v1/proxy?quest=";
const baseUrl = "https://fundgz.1234567.com.cn/js/";
// 排序状态：0=默认 1=降序(大→小) 2=升序(小→大)
let sortStatus = 0;
let fundDataCache = []; // 缓存基金数据，用于排序

// 页面加载：自动读取+自动加载
window.onload = function () {
    let saved = localStorage.getItem("fundCodes");
    if (saved) {
        document.getElementById("fundInput").value = saved;
        loadFundData();
    }
};

// 切换排序模式
function changeSort() {
    sortStatus = (sortStatus + 1) % 3;
    let arrow = document.getElementById("sortArrow");
    if(sortStatus === 1){
        arrow.textContent = "↓"; // 大→小
    }else if(sortStatus === 2){
        arrow.textContent = "↑"; // 小→大
    }else{
        arrow.textContent = ""; // 默认
    }
    renderTable(); // 重新渲染表格
}

// 加载基金数据
async function loadFundData() {
    let input = document.getElementById("fundInput").value.trim();
    if (!input) return;

    // 格式化+去重
    let codes = input.replace(/，/g, ",").replace(/\s+/g, ",").split(",").filter(c => c);
    let uniqueCodes = [...new Set(codes)];
    fundDataCache = [];

    for (let code of uniqueCodes) {
        try {
            let url = proxy + encodeURIComponent(baseUrl + code + ".js");
            let res = await fetch(url);
            let text = await res.text();
            let data = JSON.parse(text.replace("jsonpgz(", "").replace(");", ""));

            // ✅ 官方标准字段（100%有数据，无undefined）
            fundDataCache.push({
                name: data.name,
                nowRate: parseFloat(data.gszzl),   // 实时涨幅
                yesRate: parseFloat(data.zdf) || 0, // 昨日涨跌幅（兜底0）
                time: data.gztime
            });
        } catch (e) {
            fundDataCache.push({ name: `加载失败(${code})`, nowRate: 0, yesRate: 0, time: "-" });
        }
    }
    renderTable();
}

// 渲染表格（根据排序状态）
function renderTable() {
    let table = document.getElementById("fundTable");
    let sortedData = [...fundDataCache];

    // 排序逻辑
    if(sortStatus === 1){
        sortedData.sort((a,b) => b.nowRate - a.nowRate); // 大→小
    }else if(sortStatus === 2){
        sortedData.sort((a,b) => a.nowRate - b.nowRate); // 小→大
    }
    // sortStatus=0 → 默认顺序（不排序）

    let html = `<tr>
        <th>基金名称</th>
        <th onclick="changeSort()">实时涨幅 <span class="sort-arrow" id="sortArrow"></span></th>
        <th>昨日涨跌幅</th>
        <th>更新时间</th>
    </tr>`;

    sortedData.forEach(item => {
        let nowColor = item.nowRate > 0 ? "red" : "green";
        let yesColor = item.yesRate > 0 ? "red" : item.yesRate < 0 ? "green" : "";
        
        html += `
        <tr>
            <td>${item.name}</td>
            <td class="${nowColor}">${item.nowRate.toFixed(2)}%</td>
            <td class="${yesColor}">${item.yesRate.toFixed(2)}%</td>
            <td>${item.time}</td>
        </tr>`;
    });

    table.innerHTML = html;
    // 同步排序箭头
    let arrow = document.getElementById("sortArrow");
    if(sortStatus === 1) arrow.textContent = "↓";
    else if(sortStatus === 2) arrow.textContent = "↑";
    else arrow.textContent = "";
}
</script>
</body>
</html>
