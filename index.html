<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>基金实时监控</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑,system-ui;}
        body{padding:15px;background:#f6f7f9;}
        .container{max-width:700px;margin:0 auto;}
        h1{text-align:center;margin:20px 0;color:#333;}
        .input-box{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:16px;margin-bottom:10px;}
        .btn{width:100%;padding:12px;background:#2ecc71;color:white;border:none;border-radius:8px;font-size:16px;margin-bottom:15px;cursor:pointer;}
        .btn-refresh{background:#3498db;}
        .tips{text-align:center;color:#666;font-size:14px;margin-bottom:10px;line-height:1.5;}
        table{width:100%;border-collapse:collapse;background:white;border-radius:8px;overflow:hidden;box-shadow:0 1px 3px #00000010;}
        th{background:#2ecc71;color:white;padding:12px;text-align:left;}
        td{padding:12px;border-bottom:1px solid #eee;}
        .red{color:#e74c3c;font-weight:bold;}
        .green{color:#2ecc71;font-weight:bold;}
    </style>
</head>
<body>
    <div class="container">
        <h1>💰 基金实时监控</h1>

        <p class="tips">
            批量输入基金代码，用逗号或空格隔开<br>
            例：005693,161725,003096
        </p>

        <textarea class="input-box" id="fundInput" rows="3" placeholder="请输入基金代码，用逗号/空格分隔"></textarea>

        <button class="btn" onclick="saveAndLoad()">保存并加载</button>
        <button class="btn btn-refresh" onclick="loadFundData()">手动刷新数据</button>

        <table id="fundTable">
            <tr>
                <th>基金名称</th>
                <th>实时涨幅</th>
                <th>昨日涨跌幅</th>
                <th>更新时间</th>
            </tr>
        </table>
    </div>

<script>
const proxy = "https://api.codetabs.com/v1/proxy?quest=";
const baseUrl = "https://fundgz.1234567.com.cn/js/";

window.onload = function () {
    let savedCodes = localStorage.getItem("fundCodes");
    if (savedCodes) {
        document.getElementById("fundInput").value = savedCodes;
        loadFundData();
    }
};

function saveAndLoad() {
    let input = document.getElementById("fundInput").value.trim();
    if (!input) return;
    localStorage.setItem("fundCodes", input);
    loadFundData();
}

async function loadFundData() {
    let input = document.getElementById("fundInput").value.trim();
    if (!input) return;

    let codes = input.replace(/，/g, ",").replace(/\s+/g, ",").split(",").filter(c => c);
    let table = document.getElementById("fundTable");
    table.innerHTML = `<tr>
        <th>基金名称</th>
        <th>实时涨幅</th>
        <th>昨日涨跌幅</th>
        <th>更新时间</th>
    </tr>`;

    for (let code of codes) {
        try {
            let url = proxy + encodeURIComponent(baseUrl + code + ".js");
            let res = await fetch(url);
            let text = await res.text();
            let data = JSON.parse(text.replace("jsonpgz(", "").replace(");", ""));

            let nowRate = parseFloat(data.gszzl);
            let yesRate = parseFloat(data.zdjj);

            let nowColor = nowRate > 0 ? "red" : "green";
            let yesColor = yesRate > 0 ? "red" : "green";

            table.innerHTML += `
            <tr>
                <td>${data.name}</td>
                <td class="${nowColor}">${data.gszzl}%</td>
                <td class="${yesColor}">${data.zdjj}%</td>
                <td>${data.gztime}</td>
            </tr>`;
        } catch (e) {
            table.innerHTML += `<tr>
                <td>加载失败(${code})</td>
                <td>-</td>
                <td>-</td>
                <td>-</td>
            </tr>`;
        }
    }
}
</script>
</body>
</html>
