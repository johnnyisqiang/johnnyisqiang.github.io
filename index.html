<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>基金实时监控</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑,system-ui, sans-serif;}
        body{background:#f0f2f5;min-height:100vh;}
        /* 顶部栏 */
        .top{height:46px;background:#409eff;color:white;line-height:46px;padding:0 15px;font-size:16px;}
        /* 主容器 - 桌面端左右布局 */
        .container{display:flex;gap:10px;padding:10px;min-height:calc(100vh - 46px);}
        /* 左侧自选栏 */
        .left{width:200px;background:white;border:1px solid #ddd;border-radius:6px;display:flex;flex-direction:column;}
        .left-title{height:44px;line-height:44px;text-align:center;border-bottom:1px solid #ddd;font-weight:bold;font-size:16px;}
        .list{flex:1;overflow-y:auto;padding:8px;max-height:300px;}
        .item{padding:8px 10px;background:#f5f7fa;border-radius:4px;margin-bottom:4px;cursor:pointer;font-size:14px;}
        .item.selected{background:#c6e2ff;color:#409eff;}
        .btns{padding:8px;display:flex;flex-direction:column;gap:6px;border-top:1px solid #ddd;}
        .btn{height:38px;background:#409eff;color:white;border:none;border-radius:4px;cursor:pointer;font-size:14px;}
        /* 右侧表格栏 */
        .right{flex:1;background:white;border:1px solid #ddd;border-radius:6px;overflow:hidden;}
        .table-box{height:100%;overflow:auto;}
        table{width:100%;border-collapse:collapse;min-width:600px;}
        th{background:#409eff;color:white;height:40px;padding:0 10px;text-align:left;font-weight:normal;cursor:pointer;font-size:14px;}
        td{height:40px;padding:0 10px;border-bottom:1px solid #eee;font-size:14px;white-space:nowrap;}
        .red{color:#f56c6c;font-weight:bold;}
        .green{color:#67c23a;font-weight:bold;}
        .sort{font-size:12px;margin-left:4px;}
        .loading{text-align:center;padding:20px;color:#999;}
        /* 弹窗样式 */
        .modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:999;}
        .modal-box{width:90%;max-width:360px;background:white;border-radius:8px;padding:18px;}
        .modal-title{margin-bottom:12px;font-weight:bold;font-size:16px;}
        .modal-input{width:100%;height:90px;padding:10px;border:1px solid #ddd;border-radius:4px;margin-bottom:12px;font-size:14px;}
        .modal-btns{display:flex;gap:10px;justify-content:flex-end;}
        .btn-cancel{background:#f5f7fa;color:#666;}

        /* ==================== 手机端响应式适配 ==================== */
        @media (max-width:768px){
            .container{flex-direction:column;/* 手机端上下布局 */}
            .left{width:100%;height:auto;}
            .list{max-height:200px;}
            .right{width:100%;}
            .table-box{overflow-x:auto;/* 表格横向滑动 */}
            th,td{padding:0 8px;font-size:13px;}
            .top{font-size:15px;}
            .btn{height:36px;font-size:13px;}
        }
    </style>
</head>
<body>
    <div class="top">基金实时监控</div>
    <div class="container">
        <!-- 左侧自选栏 -->
        <div class="left">
            <div class="left-title">自选基金</div>
            <div class="list" id="fundList"></div>
            <div class="btns">
                <button class="btn" onclick="addModal()">添加基金</button>
                <button class="btn" onclick="loadFundData()">刷新数据</button>
                <button class="btn" onclick="delSelect()">删除选中</button>
                <button class="btn" onclick="batchModal()">批量添加</button>
            </div>
        </div>

        <!-- 右侧表格 -->
        <div class="right">
            <div class="table-box">
                <table>
                    <thead>
                        <tr>
                            <th>基金名称(代码)</th>
                            <th onclick="setSort()">今日涨幅 <span id="sortArrow"></span></th>
                            <th>持仓板块</th>
                            <th>更新时间</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 添加弹窗 -->
    <div class="modal" id="addModal">
        <div class="modal-box">
            <div class="modal-title">添加基金</div>
            <input class="modal-input" id="addInput" placeholder="输入基金代码">
            <div class="modal-btns">
                <button class="btn btn-cancel" onclick="closeModal()">取消</button>
                <button class="btn" onclick="doAdd()">确定</button>
            </div>
        </div>
    </div>

    <!-- 批量弹窗 -->
    <div class="modal" id="batchModal">
        <div class="modal-box">
            <div class="modal-title">批量添加</div>
            <textarea class="modal-input" id="batchInput" placeholder="逗号/空格分隔"></textarea>
            <div class="modal-btns">
                <button class="btn btn-cancel" onclick="closeModal()">取消</button>
                <button class="btn" onclick="doBatch()">确定</button>
            </div>
        </div>
    </div>

<script>
// 极速配置：单接口 + 2个并行，流畅不卡
const proxy = "https://api.codetabs.com/v1/proxy?quest=";
const realtimeApi = "https://fundgz.1234567.com.cn/js/";
const BATCH_SIZE = 2;

let sort = 0;
let fundData = [];
let selectSet = new Set();

// 完整版块匹配
const plates = [
    {k:['创业板','创业板指','创业板50','创成长'],v:'创业板'},
    {k:['量化','量化选股'],v:'量化策略'},
    {k:['黄金','贵金属'],v:'黄金/贵金属'},
    {k:['半导体','芯片'],v:'半导体/芯片'},
    {k:['人工智能','AI'],v:'人工智能'},
    {k:['光伏','新能源'],v:'新能源/光伏'},
    {k:['军工','国防'],v:'军工'},
    {k:['中证1000','1000'],v:'中证1000'},
    {k:['中证500','500'],v:'中证500'},
    {k:['沪深300','300'],v:'沪深300'},
    {k:['北证50','上证50'],v:'宽基指数'},
    {k:['混合'],v:'混合型'},
    {k:['债券'],v:'债券型'},
    {k:['指数','ETF'],v:'指数型'},
    {k:['消费','白酒'],v:'消费/白酒'},
    {k:['医药','医疗'],v:'医药/医疗'}
];

function getPlate(name){
    if(!name) return "其他";
    const lowerName = name.toLowerCase();
    for(let p of plates){
        if(p.k.some(w=>lowerName.includes(w.toLowerCase()))) return p.v;
    }
    return "其他";
}

// 初始化
window.onload = ()=>{
    let saved = localStorage.getItem("funds")||"";
    let codes = saved.split(",").filter(c=>c.trim());
    codes = [...new Set(codes)];
    localStorage.setItem("funds", codes.join(","));
    renderList(codes);
    loadFundData(codes);
};

// 左侧列表渲染
function renderList(codes){
    let dom = document.getElementById("fundList");
    dom.innerHTML = "";
    codes.forEach(c=>{
        let div = document.createElement("div");
        div.className = "item" + (selectSet.has(c)?" selected":"");
        div.dataset.code = c;
        div.textContent = c;
        div.onclick = ()=>{
            selectSet.has(c) ? selectSet.delete(c) : selectSet.add(c);
            div.classList.toggle("selected");
        };
        dom.appendChild(div);
    });
}

// 弹窗操作
function addModal(){document.getElementById("addModal").style.display="flex";}
function batchModal(){document.getElementById("batchModal").style.display="flex";}
function closeModal(){
    document.getElementById("addModal").style.display="none";
    document.getElementById("batchModal").style.display="none";
}

// 添加基金
function doAdd(){
    let c = document.getElementById("addInput").value.trim();
    if(!c) return;
    let old = (localStorage.getItem("funds")||"").split(",").filter(x=>x.trim());
    let codes = [...new Set([...old, c])];
    localStorage.setItem("funds", codes.join(","));
    closeModal();
    renderList(codes);
    loadFundData(codes);
}

// 批量添加
function doBatch(){
    let val = document.getElementById("batchInput").value.trim();
    if(!val) return;
    let add = val.replace(/，/g,",").replace(/\s+/g,",").split(",").filter(x=>x.trim());
    let old = (localStorage.getItem("funds")||"").split(",").filter(x=>x.trim());
    let codes = [...new Set([...old, ...add])];
    localStorage.setItem("funds", codes.join(","));
    closeModal();
    renderList(codes);
    loadFundData(codes);
}

// 删除选中
function delSelect(){
    if(selectSet.size===0) return alert("请先选中要删除的基金");
    let old = (localStorage.getItem("funds")||"").split(",").filter(x=>x.trim());
    let codes = old.filter(c=>!selectSet.has(c));
    localStorage.setItem("funds", codes.join(","));
    selectSet.clear();
    renderList(codes);
    loadFundData(codes);
}

// 加载数据
async function loadFundData(codes){
    if(!codes){
        let saved = localStorage.getItem("funds")||"";
        codes = saved.split(",").filter(c=>c.trim());
    }
    codes = [...new Set(codes)];
    localStorage.setItem("funds", codes.join(","));

    if(codes.length===0){
        document.getElementById("tableBody").innerHTML=`<tr><td colspan="4" class="loading">暂无自选基金</td></tr>`;
        return;
    }

    fundData = [];
    let body = document.getElementById("tableBody");
    body.innerHTML=`<tr><td colspan="4" class="loading">加载中...</td></tr>`;

    for(let i=0;i<codes.length;i+=BATCH_SIZE){
        let batch = codes.slice(i,i+BATCH_SIZE);
        let tasks = batch.map(async c=>{
            try{
                let url = proxy + encodeURIComponent(`${realtimeApi}${c}.js`);
                let res = await fetch(url);
                let txt = await res.text();
                let data = JSON.parse(txt.replace("jsonpgz(","").replace(");",""));
                return {
                    code: data.fundcode,
                    name: data.name,
                    now: parseFloat(data.gszzl)||0,
                    time: data.gztime||"-",
                    plate: getPlate(data.name)
                };
            }catch(e){
                return {code:c,name:"加载失败",now:0,time:"-",plate:"其他"};
            }
        });
        let res = await Promise.all(tasks);
        fundData.push(...res);
        renderTable();
    }
}

// 排序
function setSort(){
    sort = (sort+1)%3;
    let arr = ["","↓","↑"];
    document.getElementById("sortArrow").textContent=arr[sort];
    renderTable();
}

// 渲染表格
function renderTable(){
    let data = [...fundData];
    if(sort===1) data.sort((a,b)=>b.now - a.now);
    if(sort===2) data.sort((a,b)=>a.now - b.now);

    let html = "";
    for(let d of data){
        let nowCls = d.now>0?"red":d.now<0?"green":"";
        html+=`
        <tr>
            <td>${d.name}(${d.code})</td>
            <td class="${nowCls}">${d.now.toFixed(2)}%</td>
            <td>${d.plate}</td>
            <td>${d.time}</td>
        </tr>`;
    }
    document.getElementById("tableBody").innerHTML=html;
}
</script>
</body>
</html>
