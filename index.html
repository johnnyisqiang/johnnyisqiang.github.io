<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>基金实时监控助手</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "微软雅黑", system-ui, -apple-system, sans-serif; }
        body { background-color: #f0f2f5; height: 100vh; overflow: hidden; }
        /* 顶部标题栏 */
        .top-bar { height: 48px; background-color: #409EFF; color: white; line-height: 48px; padding: 0 16px; font-size: 16px; font-weight: 500; display: flex; align-items: center; gap: 8px; }
        /* 主容器 */
        .main-container { display: flex; height: calc(100vh - 48px); padding: 12px; gap: 12px; }
        /* 左侧自选栏 */
        .left-panel { width: 220px; background: #fff; border: 1px solid #dcdfe6; border-radius: 4px; display: flex; flex-direction: column; }
        .left-title { height: 48px; line-height: 48px; text-align: center; font-size: 18px; font-weight: 600; color: #303133; border-bottom: 1px solid #dcdfe6; }
        .fund-list { flex: 1; overflow-y: auto; padding: 8px; }
        .fund-item { padding: 8px 12px; margin-bottom: 4px; background: #f5f7fa; border-radius: 4px; cursor: pointer; transition: background 0.2s; }
        .fund-item:hover { background: #e4e7ed; }
        .fund-item.selected { background: #c6e2ff; color: #409EFF; font-weight: 500; }
        .btn-group { padding: 8px; border-top: 1px solid #dcdfe6; display: flex; flex-direction: column; gap: 8px; }
        .btn { height: 40px; background: #409EFF; color: #fff; border: none; border-radius: 4px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .btn:hover { background: #66b1ff; }
        /* 右侧表格栏 */
        .right-panel { flex: 1; background: #fff; border: 1px solid #dcdfe6; border-radius: 4px; display: flex; flex-direction: column; overflow: hidden; }
        .table-container { flex: 1; overflow: auto; padding: 8px; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #409EFF; color: #fff; height: 40px; padding: 0 12px; font-weight: 500; font-size: 15px; border: 1px solid #dcdfe6; cursor: pointer; transition: background 0.2s; white-space: nowrap; }
        th:hover { background: #66b1ff; }
        td { height: 40px; padding: 0 12px; border: 1px solid #dcdfe6; font-size: 14px; color: #606266; }
        tr:hover td { background: #f5f7fa; }
        .red { color: #F56C6C; font-weight: 600; }
        .green { color: #67C23A; font-weight: 600; }
        .sort-arrow { font-size: 12px; margin-left: 4px; }
        /* 弹窗样式 */
        .modal { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 999; }
        .modal-content { width: 400px; background: #fff; border-radius: 8px; padding: 20px; }
        .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: #303133; }
        .modal-input { width: 100%; height: 100px; padding: 12px; border: 1px solid #dcdfe6; border-radius: 4px; font-size: 14px; resize: none; margin-bottom: 16px; }
        .modal-btns { display: flex; justify-content: flex-end; gap: 12px; }
        .btn-cancel { background: #f5f7fa; color: #606266; }
        .btn-cancel:hover { background: #e4e7ed; }
        /* 加载状态 */
        .loading { text-align: center; padding: 20px; color: #909399; font-size: 14px; }
    </style>
</head>
<body>
    <!-- 顶部标题栏 -->
    <div class="top-bar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"></path></svg>
        基金实时监控助手
    </div>

    <!-- 主容器 -->
    <div class="main-container">
        <!-- 左侧自选基金栏 -->
        <div class="left-panel">
            <div class="left-title">📋 自选基金</div>
            <div class="fund-list" id="fundList"></div>
            <div class="btn-group">
                <button class="btn" onclick="openAddModal()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"></path></svg>
                    添加基金
                </button>
                <button class="btn" onclick="loadFundData()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"></path></svg>
                    刷新数据
                </button>
                <button class="btn" onclick="deleteSelected()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"></path></svg>
                    删除选中
                </button>
                <button class="btn" onclick="openBatchModal()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"></path></svg>
                    批量添加
                </button>
            </div>
        </div>

        <!-- 右侧表格栏 -->
        <div class="right-panel">
            <div class="table-container">
                <table id="fundTable">
                    <thead>
                        <tr>
                            <th>基金名称 (代码)</th>
                            <th onclick="changeSort()">今日涨幅 <span class="sort-arrow" id="sortArrow"></span></th>
                            <th>昨日涨幅</th>
                            <th>持仓板块</th>
                            <th>更新时间</th>
                        </tr>
                    </thead>
                    <tbody id="fundTableBody">
                        <tr><td colspan="5" class="loading">正在加载基金数据...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 添加基金弹窗 -->
    <div class="modal" id="addModal">
        <div class="modal-content">
            <div class="modal-title">添加基金</div>
            <input type="text" class="modal-input" id="addInput" placeholder="请输入基金代码（如：005693）">
            <div class="modal-btns">
                <button class="btn btn-cancel" onclick="closeAddModal()">取消</button>
                <button class="btn" onclick="confirmAdd()">确定</button>
            </div>
        </div>
    </div>

    <!-- 批量添加弹窗 -->
    <div class="modal" id="batchModal">
        <div class="modal-content">
            <div class="modal-title">批量添加基金</div>
            <textarea class="modal-input" id="batchInput" placeholder="请输入基金代码，用逗号/空格分隔（如：005693,161725）"></textarea>
            <div class="modal-btns">
                <button class="btn btn-cancel" onclick="closeBatchModal()">取消</button>
                <button class="btn" onclick="confirmBatchAdd()">确定</button>
            </div>
        </div>
    </div>

<script>
// ==================== 核心配置 ====================
const PROXY = "https://api.allorigins.win/raw?url="; // 稳定跨域代理
const BASE_URL = "https://fundgz.1234567.com.cn/js/"; // 天天基金官方接口
const BATCH_SIZE = 10; // 分批次并行请求，一次10个，避免被拦截
let sortStatus = 0; // 排序状态：0=默认 1=降序(大→小) 2=升序(小→大)
let fundDataCache = []; // 基金数据缓存
let selectedCodes = new Set(); // 选中的基金代码

// ==================== 持仓板块智能匹配规则 ====================
const PLATE_MAP = [
    { keywords: ['军工', '中证军工'], plate: '军工' },
    { keywords: ['光伏', '光伏产业'], plate: '光伏' },
    { keywords: ['科创', '科创板'], plate: '科创板' },
    { keywords: ['2000', '中证2000'], plate: '小盘宽基' },
    { keywords: ['卫星', '商用卫星'], plate: '卫星互联网' },
    { keywords: ['恒生科技'], plate: '港股科技' },
    { keywords: ['创业', '创业板'], plate: '创业板' },
    { keywords: ['制造', '先进制造'], plate: '高端制造' },
    { keywords: ['消费'], plate: '消费' },
    { keywords: ['医药', '医疗'], plate: '医药医疗' },
    { keywords: ['新能源'], plate: '新能源' },
    { keywords: ['金融', '银行', '证券'], plate: '金融地产' },
    { keywords: ['混合'], plate: '混合型' },
    { keywords: ['债券'], plate: '债券型' }
];

// 根据基金名称自动匹配板块
function getPlateByName(name) {
    for (const item of PLATE_MAP) {
        if (item.keywords.some(k => name.includes(k))) {
            return item.plate;
        }
    }
    return "其他板块";
}

// ==================== 页面加载初始化 ====================
window.onload = function () {
    const savedCodes = localStorage.getItem("fundCodes");
    if (savedCodes) {
        const codes = savedCodes.split(",").filter(c => c);
        renderFundList(codes);
        loadFundData(codes);
    } else {
        renderFundList([]);
        document.getElementById("fundTableBody").innerHTML = `<tr><td colspan="5" class="loading">暂无自选基金，请添加</td></tr>`;
    }
};

// ==================== 左侧列表操作 ====================
// 渲染左侧自选列表
function renderFundList(codes) {
    const listEl = document.getElementById("fundList");
    listEl.innerHTML = "";
    codes.forEach(code => {
        const item = document.createElement("div");
        item.className = "fund-item" + (selectedCodes.has(code) ? " selected" : "");
        item.dataset.code = code;
        item.onclick = () => {
            selectedCodes.has(code) ? selectedCodes.delete(code) : selectedCodes.add(code);
            item.classList.toggle("selected");
        };
        item.textContent = code;
        listEl.appendChild(item);
    });
}

// 打开/关闭添加弹窗
function openAddModal() { document.getElementById("addModal").style.display = "flex"; document.getElementById("addInput").focus(); }
function closeAddModal() { document.getElementById("addModal").style.display = "none"; }
// 确认添加单个基金
function confirmAdd() {
    const input = document.getElementById("addInput").value.trim();
    if (!input) return;
    const savedCodes = localStorage.getItem("fundCodes") || "";
    let codes = savedCodes ? savedCodes.split(",").filter(c => c) : [];
    if (!codes.includes(input)) codes.push(input);
    codes = [...new Set(codes)]; // 去重
    localStorage.setItem("fundCodes", codes.join(","));
    closeAddModal();
    renderFundList(codes);
    loadFundData(codes);
}

// 打开/关闭批量添加弹窗
function openBatchModal() { document.getElementById("batchModal").style.display = "flex"; document.getElementById("batchInput").focus(); }
function closeBatchModal() { document.getElementById("batchModal").style.display = "none"; }
// 确认批量添加
function confirmBatchAdd() {
    const input = document.getElementById("batchInput").value.trim();
    if (!input) return;
    const newCodes = input.replace(/，/g, ",").replace(/\s+/g, ",").split(",").filter(c => c);
    const savedCodes = localStorage.getItem("fundCodes") || "";
    let codes = savedCodes ? savedCodes.split(",").filter(c => c) : [];
    codes = [...new Set([...codes, ...newCodes])]; // 合并+去重
    localStorage.setItem("fundCodes", codes.join(","));
    closeBatchModal();
    renderFundList(codes);
    loadFundData(codes);
}

// 删除选中基金
function deleteSelected() {
    if (selectedCodes.size === 0) { alert("请先选中要删除的基金"); return; }
    const savedCodes = localStorage.getItem("fundCodes") || "";
    let codes = savedCodes ? savedCodes.split(",").filter(c => c) : [];
    codes = codes.filter(c => !selectedCodes.has(c));
    localStorage.setItem("fundCodes", codes.join(","));
    selectedCodes.clear();
    renderFundList(codes);
    loadFundData(codes);
}

// ==================== 数据加载（分批次并行+极速加载） ====================
async function loadFundData(codes) {
    // 读取本地代码
    if (!codes) {
        const savedCodes = localStorage.getItem("fundCodes");
        codes = savedCodes ? savedCodes.split(",").filter(c => c) : [];
    }
    if (codes.length === 0) {
        document.getElementById("fundTableBody").innerHTML = `<tr><td colspan="5" class="loading">暂无自选基金，请添加</td></tr>`;
        return;
    }

    // 彻底去重
    codes = [...new Set(codes)];
    fundDataCache = [];
    document.getElementById("fundTableBody").innerHTML = `<tr><td colspan="5" class="loading">正在加载${codes.length}只基金数据...</td></tr>`;

    // 分批次并行请求
    for (let i = 0; i < codes.length; i += BATCH_SIZE) {
        const batch = codes.slice(i, i + BATCH_SIZE);
        // 并行请求当前批次
        const batchResults = await Promise.allSettled(
            batch.map(code => fetch(PROXY + encodeURIComponent(BASE_URL + code + ".js"))
                .then(res => res.text())
                .then(text => {
                    // 正确解析天天基金接口数据
                    const cleanText = text.replace("jsonpgz(", "").replace(");", "");
                    const data = JSON.parse(cleanText);
                    return {
                        code: data.fundcode,
                        name: data.name,
                        nowRate: parseFloat(data.gszzl) || null, // 今日涨幅
                        yesRate: parseFloat(data.zdf) || null, // 昨日涨幅
                        time: data.gztime || "无时间"
                    };
                })
            )
        );

        // 处理批次结果
        batchResults.forEach((result, idx) => {
            const code = batch[idx];
            if (result.status === "fulfilled") {
                const fundData = result.value;
                fundDataCache.push(fundData);
                // 更新左侧列表名称
                const listItem = document.querySelector(`.fund-item[data-code="${code}"]`);
                if (listItem) listItem.textContent = `${fundData.name} (${code})`;
            } else {
                // 加载失败兜底
                fundDataCache.push({
                    code: code,
                    name: `加载失败(${code})`,
                    nowRate: null,
                    yesRate: null,
                    time: "-"
                });
            }
        });

        // 每加载完一批，渲染一次，提升体验
        renderTable();
    }
}

// ==================== 表格渲染+排序 ====================
// 切换排序模式
function changeSort() {
    sortStatus = (sortStatus + 1) % 3;
    renderTable();
}

// 渲染表格
function renderTable() {
    const tableBody = document.getElementById("fundTableBody");
    let sortedData = [...fundDataCache];

    // 排序逻辑
    if (sortStatus === 1) {
        sortedData.sort((a, b) => (b.nowRate ?? -Infinity) - (a.nowRate ?? -Infinity)); // 降序
    } else if (sortStatus === 2) {
        sortedData.sort((a, b) => (a.nowRate ?? Infinity) - (b.nowRate ?? Infinity)); // 升序
    }

    // 渲染表格内容
    let html = "";
    sortedData.forEach(item => {
        // 今日涨幅样式
        const nowRate = item.nowRate;
        const nowDisplay = nowRate !== null ? `${nowRate.toFixed(2)}%` : "-";
        const nowColor = nowRate > 0 ? "red" : nowRate < 0 ? "green" : "";

        // 昨日涨幅样式
        const yesRate = item.yesRate;
        const yesDisplay = yesRate !== null ? `${yesRate.toFixed(2)}%` : "-";
        const yesColor = yesRate > 0 ? "red" : yesRate < 0 ? "green" : "";

        // 自动匹配板块
        const plate = item.name.includes("加载失败") ? "-" : getPlateByName(item.name);

        html += `
        <tr>
            <td>${item.name} (${item.code})</td>
            <td class="${nowColor}">${nowDisplay}</td>
            <td class="${yesColor}">${yesDisplay}</td>
            <td>${plate}</td>
            <td>${item.time}</td>
        </tr>`;
    });

    tableBody.innerHTML = html || `<tr><td colspan="5" class="loading">暂无数据</td></tr>`;

    // 更新排序箭头
    const arrow = document.getElementById("sortArrow");
    arrow.textContent = sortStatus === 1 ? "↓" : sortStatus === 2 ? "↑" : "";
}
</script>
</body>
</html>
