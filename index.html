<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>基金实时监控</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑,system-ui;}
        body{background:#f0f2f5;height:100vh;overflow:hidden;}
        .top{height:46px;background:#409eff;color:white;line-height:46px;padding:0 15px;}
        .container{display:flex;height:calc(100vh - 46px);padding:10px;gap:10px;}
        .left{width:200px;background:white;border:1px solid #ddd;border-radius:6px;display:flex;flex-direction:column;}
        .left-title{height:44px;line-height:44px;text-align:center;border-bottom:1px solid #ddd;font-weight:bold;}
        .list{flex:1;overflow-y:auto;padding:8px;}
        .item{padding:8px 10px;background:#f5f7fa;border-radius:4px;margin-bottom:4px;cursor:pointer;}
        .item.selected{background:#c6e2ff;color:#409eff;}
        .btns{padding:8px;display:flex;flex-direction:column;gap:6px;border-top:1px solid #ddd;}
        .btn{height:38px;background:#409eff;color:white;border:none;border-radius:4px;cursor:pointer;}
        .right{flex:1;background:white;border:1px solid #ddd;border-radius:6px;overflow:hidden;display:flex;flex-direction:column;}
        .table-box{flex:1;overflow:auto;padding:8px;}
        table{width:100%;border-collapse:collapse;}
        th{background:#409eff;color:white;height:38px;padding:0 10px;text-align:left;font-weight:normal;cursor:pointer;}
        td{height:38px;padding:0 10px;border-bottom:1px solid #eee;}
        .red{color:#f56c6c;font-weight:bold;}
        .green{color:#67c23a;font-weight:bold;}
        .sort{font-size:12px;margin-left:4px;}
        .loading{text-align:center;padding:20px;color:#999;}
        .modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;}
        .modal-box{width:360px;background:white;border-radius:8px;padding:18px;}
        .modal-title{margin-bottom:12px;font-weight:bold;}
        .modal-input{width:100%;height:90px;padding:10px;border:1px solid #ddd;border-radius:4px;margin-bottom:12px;}
        .modal-btns{display:flex;gap:10px;justify-content:flex-end;}
        .btn-cancel{background:#f5f7fa;color:#666;}
    </style>
</head>
<body>
    <div class="top">基金实时监控</div>
    <div class="container">
        <div class="left">
            <div class="left-title">自选基金</div>
            <div class="list" id="fundList"></div>
            <div class="btns">
                <button class="btn" onclick="addModal()">添加基金</button>
                <button class="btn" onclick="loadFundData()">刷新数据</button>
                <button class="btn" onclick="delSelect()">删除选中</button>
                <button class="btn" onclick="batchModal()">批量添加</button>
            </div>
        </div>
        <div class="right">
            <div class="table-box">
                <table>
                    <thead>
                        <tr>
                            <th>基金名称(代码)</th>
                            <th onclick="setSort()">今日涨幅 <span id="sortArrow"></span></th>
                            <th>昨日涨幅</th>
                            <th>持仓板块</th>
                            <th>更新时间</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal" id="addModal">
        <div class="modal-box">
            <div class="modal-title">添加基金</div>
            <input class="modal-input" id="addInput" placeholder="输入基金代码">
            <div class="modal-btns">
                <button class="btn btn-cancel" onclick="closeModal()">取消</button>
                <button class="btn" onclick="doAdd()">确定</button>
            </div>
        </div>
    </div>

    <div class="modal" id="batchModal">
        <div class="modal-box">
            <div class="modal-title">批量添加</div>
            <textarea class="modal-input" id="batchInput" placeholder="逗号/空格分隔"></textarea>
            <div class="modal-btns">
                <button class="btn btn-cancel" onclick="closeModal()">取消</button>
                <button class="btn" onclick="doBatch()">确定</button>
            </div>
        </div>
    </div>

<script>
// 核心配置：稳定代理+批次请求
const proxy = "https://api.codetabs.com/v1/proxy?quest=";
const api = "https://fundgz.1234567.com.cn/js/";
const BATCH_SIZE = 10; // 10个并行请求，速度稳定

let sort = 0; // 0默认 1从大到小 2从小到大
let fundData = [];
let selectSet = new Set();

// 持仓板块智能匹配规则
const plates = [
    {k:['军工','国防'],v:'军工'},
    {k:['光伏','新能源'],v:'新能源/光伏'},
    {k:['科创','科创板'],v:'科创板'},
    {k:['创业板','创业'],v:'创业板'},
    {k:['医药','医疗'],v:'医药'},
    {k:['消费','白酒'],v:'消费'},
    {k:['半导体','芯片'],v:'半导体'},
    {k:['恒生','港股'],v:'港股科技'},
    {k:['混合'],v:'混合型'},
    {k:['债券'],v:'债券型'},
    {k:['2000','中证2000'],v:'小盘宽基'},
    {k:['卫星','商用卫星'],v:'卫星互联网'}
];

// 根据基金名称匹配板块
function getPlate(name){
    if(!name || name.includes("加载失败")) return "其他";
    for(let p of plates){
        if(p.k.some(w=>name.includes(w))) return p.v;
    }
    return "其他";
}

// 页面加载初始化
window.onload = ()=>{
    let saved = localStorage.getItem("funds")||"";
    let codes = saved.split(",").filter(c=>c.trim());
    // 🔥 初始化就彻底去重，避免历史重复
    codes = [...new Set(codes)];
    localStorage.setItem("funds", codes.join(","));
    renderList(codes);
    loadFundData(codes);
};

// 左侧列表：仅显示代码
function renderList(codes){
    let dom = document.getElementById("fundList");
    dom.innerHTML = "";
    codes.forEach(c=>{
        let div = document.createElement("div");
        div.className = "item" + (selectSet.has(c)?" selected":"");
        div.dataset.code = c;
        div.textContent = c; // 仅显示代码
        div.onclick = ()=>{
            selectSet.has(c) ? selectSet.delete(c) : selectSet.add(c);
            div.classList.toggle("selected");
        };
        dom.appendChild(div);
    });
}

// 弹窗操作
function addModal(){document.getElementById("addModal").style.display="flex";}
function batchModal(){document.getElementById("batchModal").style.display="flex";}
function closeModal(){
    document.getElementById("addModal").style.display="none";
    document.getElementById("batchModal").style.display="none";
}

// 添加单个基金（自动去重）
function doAdd(){
    let c = document.getElementById("addInput").value.trim();
    if(!c) return;
    let old = (localStorage.getItem("funds")||"").split(",").filter(x=>x.trim());
    // 🔥 去重后添加
    let codes = [...new Set([...old, c])];
    localStorage.setItem("funds", codes.join(","));
    closeModal();
    renderList(codes);
    loadFundData(codes);
}

// 批量添加基金（自动去重）
function doBatch(){
    let val = document.getElementById("batchInput").value.trim();
    if(!val) return;
    let add = val.replace(/，/g,",").replace(/\s+/g,",").split(",").filter(x=>x.trim());
    let old = (localStorage.getItem("funds")||"").split(",").filter(x=>x.trim());
    // 🔥 彻底去重合并
    let codes = [...new Set([...old, ...add])];
    localStorage.setItem("funds", codes.join(","));
    closeModal();
    renderList(codes);
    loadFundData(codes);
}

// 删除选中基金
function delSelect(){
    if(selectSet.size===0) return alert("请先选中要删除的基金");
    let old = (localStorage.getItem("funds")||"").split(",").filter(x=>x.trim());
    // 过滤掉选中的代码
    let codes = old.filter(c=>!selectSet.has(c));
    localStorage.setItem("funds", codes.join(","));
    selectSet.clear();
    renderList(codes);
    loadFundData(codes);
}

// 🔥 核心：加载数据+彻底去重+正确解析昨日涨幅
async function loadFundData(codes){
    // 读取代码，无参数则从本地读取
    if(!codes){
        let saved = localStorage.getItem("funds")||"";
        codes = saved.split(",").filter(c=>c.trim());
    }
    // 🔥 第一步：彻底去重，永远不会有重复
    codes = [...new Set(codes)];
    // 回存本地，确保后续无重复
    localStorage.setItem("funds", codes.join(","));

    if(codes.length===0){
        document.getElementById("tableBody").innerHTML=`<tr><td colspan="5" class="loading">暂无自选基金</td></tr>`;
        return;
    }

    fundData = [];
    let body = document.getElementById("tableBody");
    body.innerHTML=`<tr><td colspan="5" class="loading">加载中...</td></tr>`;

    // 分批次并行请求，速度稳定
    for(let i=0;i<codes.length;i+=BATCH_SIZE){
        let batch = codes.slice(i,i+BATCH_SIZE);
        let tasks = batch.map(async c=>{
            try{
                let u = proxy + encodeURIComponent(api + c + ".js");
                let res = await fetch(u);
                let txt = await res.text();
                // 正确解析天天基金接口数据
                let d = JSON.parse(txt.replace("jsonpgz(","").replace(");",""));
                
                // 🔥 正确解析昨日涨跌幅（zdf是官方标准字段）
                let zdf = parseFloat(d.zdf);
                let yesRate = isNaN(zdf) ? null : zdf;

                return {
                    code:d.fundcode,
                    name:d.name,
                    now:parseFloat(d.gszzl)||0, // 今日实时涨幅
                    yes:yesRate, // 昨日涨跌幅（正确字段）
                    time:d.gztime||"-",
                    plate:getPlate(d.name)
                };
            }catch(e){
                console.error(`加载${c}失败:`,e);
                return {code:c,name:"加载失败",now:0,yes:null,time:"-",plate:"-"};
            }
        });
        let res = await Promise.all(tasks);
        fundData.push(...res);
        renderTable(); // 每批加载完立即渲染
    }
}

// 切换排序
function setSort(){
    sort = (sort+1)%3;
    let arr = ["","↓","↑"];
    document.getElementById("sortArrow").textContent=arr[sort];
    renderTable();
}

// 渲染表格（正确显示昨日涨幅）
function renderTable(){
    let data = [...fundData];
    // 排序逻辑
    if(sort===1) data.sort((a,b)=>b.now - a.now);
    if(sort===2) data.sort((a,b)=>a.now - b.now);

    let html = "";
    for(let d of data){
        // 今日涨幅样式
        let nowCls = d.now>0?"red":d.now<0?"green":"";
        // 🔥 昨日涨幅样式：空值显示-，有数据正常显示
        let yesVal = d.yes;
        let yesDisplay = yesVal !== null ? `${yesVal.toFixed(2)}%` : "-";
        let yesCls = yesVal > 0 ? "red" : yesVal < 0 ? "green" : "";

        html+=`
        <tr>
            <td>${d.name}(${d.code})</td>
            <td class="${nowCls}">${d.now.toFixed(2)}%</td>
            <td class="${yesCls}">${yesDisplay}</td>
            <td>${d.plate}</td>
            <td>${d.time}</td>
        </tr>`;
    }
    document.getElementById("tableBody").innerHTML=html;
}
</script>
</body>
</html>
